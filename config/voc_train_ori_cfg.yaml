DATASET:
  NAME: 'voc'
  NUM_CLASSES: 20
  DATAROOT: 'data/VOC2012/'
  SCALE: [2048, 336]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [336, 336]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/voc_ViT16_clip_text.pth'
  K: 2
  THRESHOLD: 23
  REDUCE_ZERO_LABEL: TRUE
  IGNORE_INDEX: 255

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: True
TEXT_PRUNING:
  ENABLE: False
  GATE_MIN: 0.3
  PSEUDO_W: 0.5
  GLOBAL_W: 0.5
  DEBUG: False
TRAIN:
  BATCH_SIZE: 4
  MAX_EPOCH: 200
  EPOCH: 50
  LR: 0.01
TEST:
  BATCH_SIZE: 1

EVAL_METRIC: "miou"
SAVE_DIR: "outputs/voc_pglp_seg_train/"
NUM_WORKERS: 4
